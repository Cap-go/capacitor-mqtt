<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>@capgo/capacitor-mqtt Example</title>
    <link rel="stylesheet" href="/src/style.css" />
  </head>
  <body>
    <main class="shell">
      <section class="hero">
        <p class="eyebrow">Capgo plugin example</p>
        <h1>MQTT bridge console</h1>
        <p class="lead">
          Connect to a broker, subscribe to a topic, publish a payload, and inspect connection and message events from
          the local plugin source.
        </p>
      </section>

      <section class="panel">
        <div class="status-row">
          <div>
            <p class="label">Connection state</p>
            <strong id="status-badge" class="badge">Disconnected</strong>
          </div>
        </div>

        <div class="form-grid">
          <label class="field">
            <span>Broker host</span>
            <input id="server-uri" type="text" value="broker.hivemq.com" />
          </label>
          <label class="field">
            <span>Port</span>
            <input id="server-port" type="number" value="1883" />
          </label>
          <label class="field">
            <span>Client ID</span>
            <input id="client-id" type="text" value="capgo-mqtt-example" />
          </label>
          <label class="field">
            <span>Topic</span>
            <input id="topic" type="text" value="capgo/example" />
          </label>
          <label class="field field-full">
            <span>Message payload</span>
            <textarea id="payload" rows="4">Hello from Capgo MQTT</textarea>
          </label>
        </div>

        <div class="actions">
          <button id="connect-button">Connect</button>
          <button id="subscribe-button" class="ghost">Subscribe</button>
          <button id="publish-button" class="ghost">Publish</button>
          <button id="disconnect-button" class="danger">Disconnect</button>
        </div>

        <pre id="plugin-output">Waiting for action…</pre>
      </section>
    </main>
    <script type="module" src="/src/main.js"></script>
  </body>
</html>
